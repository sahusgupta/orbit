<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orbit Client Dashboard</title>
    <link rel="stylesheet" href="/dashboard.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Orbit Client Dashboard</h1>
          <p>Client usage, updates, table starts, app opens/closes, and live errors.</p>
        </div>
        <form id="key-form" class="key-form">
          <input id="api-key" type="password" autocomplete="off" placeholder="API key" />
          <button>Connect</button>
        </form>
      </header>

      <section id="status" class="status">Waiting for API key.</section>

      <section class="metrics" aria-label="Summary metrics">
        <article>
          <span>Clients</span>
          <strong id="metric-clients">0</strong>
        </article>
        <article>
          <span>Active 24h</span>
          <strong id="metric-active">0</strong>
        </article>
        <article>
          <span>Events</span>
          <strong id="metric-events">0</strong>
        </article>
        <article>
          <span>Errors</span>
          <strong id="metric-errors">0</strong>
        </article>
        <article>
          <span>Tables 24h</span>
          <strong id="metric-tables">0</strong>
        </article>
      </section>

      <section class="grid">
        <article class="panel">
          <div class="panel-head">
            <h2>Live Errors</h2>
            <span id="error-count">0</span>
          </div>
          <div id="errors" class="list empty">No errors received.</div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Recent Usage</h2>
            <span id="event-count">0</span>
          </div>
          <div id="events" class="list empty">No events received.</div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Clients</h2>
            <span id="client-count">0</span>
          </div>
          <div id="clients" class="table-list empty">No clients yet.</div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Venues</h2>
            <span id="venue-count">0</span>
          </div>
          <div id="venues" class="table-list empty">No venues yet.</div>
        </article>
      </section>
    </main>
    <script src="/dashboard.js"></script>
  </body>
</html>
