name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            player-app/package-lock.json
      - run: npm ci
      - run: npm ci --prefix player-app
      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run player:typecheck
      - run: npm run build
